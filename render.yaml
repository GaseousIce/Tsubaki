services:
    - type: worker
      name: tsubaki-discord-bot
      runtime: python
      plan: free
      autoDeploy: true
      buildCommand: pip install --upgrade pip && pip install -r requirements.txt
      startCommand: python src/main.py
      envVars:
          - key: PYTHON_VERSION
            value: 3.11.11
          - key: DISCORD_TOKEN
            sync: false
          - key: GROQ_API_KEY
            sync: false
          - key: GROQ_MODEL
            value: llama-3.1-8b-instant
